<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakana Dashboard - 列車空席照会</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <button class="menu-toggle" id="menu-toggle">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="card-title">
            <i class="fa-solid fa-fish"></i> Sakana Dashboard
        </div>
    </div>

    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1><i class="fa-solid fa-fish"></i> Sakana Dashboard</h1>
        </div>
        <div class="sidebar-nav">
            <div class="nav-group">
                <div class="nav-title">Train Routes</div>
                
                <!-- Sunrise -->
                <div class="nav-item tab-btn" data-course="sunrise">
                    <i class="fa-solid fa-moon"></i> 寝台特急サンライズ
                </div>
                
                <!-- Ginga -->
                <div class="nav-item">
                    <i class="fa-solid fa-star"></i> WEST EXPRESS 銀河
                </div>
                <div class="nav-sub">
                    <div class="nav-item tab-btn" data-course="sanin">山陰コース</div>
                    <div class="nav-item tab-btn active" data-course="kinan">紀南コース</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="top-header">
            <h2 class="page-title" id="display-title">WEST EXPRESS 銀河（紀南コース）</h2>
            <div class="page-meta">
                <i class="fa-regular fa-clock"></i>
                <span id="last-updated">最終更新: 取得中...</span>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <!-- 最近の空席状況 -->
            <div class="card col-8">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-list-check"></i> 最近の空席状況</div>
                </div>
                <div class="table-container">
                    <table id="status-table">
                        <thead>
                            <tr id="status-table-header">
                                <!-- JSで動的生成 -->
                            </tr>
                        </thead>
                        <tbody>
                            <!-- JSで動的生成 -->
                        </tbody>
                    </table>
                </div>
                <div style="text-align: center; margin-top: 10px;">
                    <button id="status-more-btn" class="page-btn" style="display: none; width: 100%;">もっと見る</button>
                </div>
            </div>

            <!-- 空席出現率 (席種別) -->
            <div class="card col-4">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-chart-pie"></i> 席種別 空席出現率</div>
                </div>
                <div class="chart-container donut-container">
                    <canvas id="seatChart"></canvas>
                </div>
            </div>

            <!-- 空席出現率 (曜日別) -->
            <div class="card col-8">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-chart-bar"></i> 曜日別 空席検知傾向</div>
                </div>
                <div class="chart-container">
                    <canvas id="dayChart"></canvas>
                </div>
            </div>

            <!-- タイムライン -->
            <div class="card col-4">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 検知タイムライン</div>
                </div>
                <div class="timeline" id="timeline-container">
                    <!-- JSで動的生成 -->
                </div>
                <div style="text-align: center; margin-top: 10px;">
                    <button id="timeline-more-btn" class="page-btn" style="display: none; width: 100%;">もっと見る</button>
                </div>
            </div>

            <!-- 詳細ログ (ページネーション) -->
            <div class="card col-12">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-database"></i> アクセスログ (直近1000件)</div>
                </div>
                <div class="table-container">
                    <table id="log-table">
                        <thead>
                            <tr>
                                <th>取得日時</th>
                                <th>列車名</th>
                                <th>区間</th>
                                <th>対象日</th>
                                <th>席種</th>
                                <th>結果</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- JSで動的生成 -->
                        </tbody>
                    </table>
                </div>
                
                <div style="text-align: center; margin-top: 10px;">
                    <button id="log-more-btn" class="page-btn" style="display: none; width: 100%;">もっと見る</button>
                </div>
            </div>

        </div>
    </main>

    <script src="dashboard.js"></script>
</body>
</html>
