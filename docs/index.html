<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakana Insight - 列車空席照会 (v2)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar-container" class="sidebar-container"></aside>
        
        <!-- Mobile Overlay -->
        <div id="mobile-overlay" class="mobile-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="header-left">
                    <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 id="page-title" class="page-title">Loading...</h2>
                </div>
                <div class="page-meta">
                    <i class="fa-regular fa-clock"></i>
                    <span id="last-updated">最終更新: --</span>
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Status Table -->
                <section class="card col-8">
                    <header class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-list-check"></i> 最近の空席状況</h3>
                    </header>
                    <div id="status-table-container"></div>
                </section>

                <!-- Donut Chart -->
                <section class="card col-4">
                    <header class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-chart-pie"></i> 席種別 空席出現率</h3>
                    </header>
                    <div class="chart-wrapper donut-wrapper">
                        <canvas id="seatChart"></canvas>
                    </div>
                </section>

                <!-- Bar Chart -->
                <section class="card col-8">
                    <header class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-chart-bar"></i> 曜日別 空席検知傾向</h3>
                    </header>
                    <div class="chart-wrapper">
                        <canvas id="dayChart"></canvas>
                    </div>
                </section>

                <!-- Timeline -->
                <section class="card col-4">
                    <header class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> 検知タイムライン</h3>
                    </header>
                    <div id="timeline-container"></div>
                </section>

                <!-- Access Logs -->
                <section class="card col-12">
                    <header class="card-header">
                        <h3 class="card-title"><i class="fa-solid fa-database"></i> アクセスログ</h3>
                    </header>
                    <div id="access-logs-container"></div>
                </section>
            </div>
        </main>
    </div>

    <!-- Generic Modal Component -->
    <div id="app-modal" class="modal-overlay">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button id="modal-close" class="modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </header>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <!-- Main JS Module -->
    <script type="module" src="./js/main.js"></script>
</body>
</html>
