name: Ginga Checker

on:
  schedule:
    # JST 6:00 から JST 22:00 まで 2時間おき (UTC 21,23,1,3,5,7,9,11,13) 混雑を避けるため毎時17分に実行
    - cron: '17 1,3,5,7,9,11,13,21,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    # Playwrightのバージョンに基づいたキャッシュの設定
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(pip show playwright | grep Version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # キャッシュがない場合のみブラウザをインストール
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: playwright install chromium --with-deps

    # キャッシュがあってもシステム依存関係（OSライブラリ）だけは念のため入れる
    - name: Install Playwright system deps
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: playwright install-deps chromium

    - name: Run script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      run: python ginga.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_state.json docs/log_*.json
        git commit -m "Update last state and history [skip ci]" || exit 0
        git push
