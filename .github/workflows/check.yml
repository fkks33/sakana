name: e5489 Checker

on:
  schedule:
    # JST 6:00, 12:00, 18:00 に実行 (UTC 21:00, 03:00, 09:00)
    - cron: '0 21,3,9 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    # Playwrightのバージョンに基づいたキャッシュの設定
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(pip show playwright | grep Version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # キャッシュがない場合のみブラウザをインストール
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: playwright install chromium --with-deps

    # キャッシュがあってもシステム依存関係（OSライブラリ）だけは念のため入れる
    - name: Install Playwright system deps
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: playwright install-deps chromium

    - name: Run script
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python main.py
