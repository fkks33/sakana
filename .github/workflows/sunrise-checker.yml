name: Sunrise Checker

on:
  schedule:
    # 毎日 日本時間の朝07:00 (UTCの22:00) に実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効化

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    # Playwrightのバージョンに基づいたキャッシュの設定
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(pip show playwright | grep Version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # キャッシュがない場合のみブラウザをインストール
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: playwright install chromium --with-deps

    # キャッシュがあってもシステム依存関係（OSライブラリ）だけは念のため入れる
    - name: Install Playwright system deps
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: playwright install-deps chromium

    - name: Run script
      env:
        # Secretsは既存のリポジトリに登録されているものをそのまま使えます
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      # ↓ ここを新しいPythonファイル名に変更してください
      run: python sunrise.py
