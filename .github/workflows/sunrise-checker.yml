name: Sunrise Checker

on:
  schedule:
    # JST 6:00 から JST 23:00 まで 1時間おき (UTC 21:00-23:00, 0:00-14:00) 混雑を避けるため毎時17分に実行
    - cron: '17 0-14,21-23 * * *'
  workflow_dispatch: # 手動実行用ボタンも有効化

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install pip dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright

    # Playwrightのバージョンに基づいたキャッシュの設定
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(pip show playwright | grep Version | cut -d ' ' -f 2)" >> $GITHUB_OUTPUT

    - name: Cache Playwright Browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

    # キャッシュがない場合のみブラウザをインストール
    - name: Install Playwright Browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: playwright install chromium --with-deps

    # キャッシュがあってもシステム依存関係（OSライブラリ）だけは念のため入れる
    - name: Install Playwright system deps
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: playwright install-deps chromium

    - name: Run script
      env:
        # Secretsは既存のリポジトリに登録されているものをそのまま使えます
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      # ↓ ここを新しいPythonファイル名に変更してください
      run: python sunrise.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add last_state.json docs/log_*.json
        git commit -m "Update last state and history [skip ci]" || exit 0
        git push
